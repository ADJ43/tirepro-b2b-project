services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tirepro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tirepro123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:tirepro123@db:5432/tirepro
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      PORT: "8000"
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./frontend
    ports:
      - "3000:80"
    environment:
      PORT: "80"
      BACKEND_URL: "http://api:8000"
    depends_on:
      - api

volumes:
  pgdata:
